# Packaging for the Switchyard desktop app. Both OS legs sign in CI when the
# corresponding secrets are present (see .github/workflows/release.yml and
# desktop/README.md): macOS via Developer ID + notarization, Windows via
# Azure Trusted Signing (win.azureSignOptions flags injected by the workflow)
# or a classic PFX (WIN_CSC_LINK). Without secrets electron-builder logs a
# warning and falls back to unsigned builds, so forks and local
# `npm run dist` still work — but macOS auto-update needs signed builds, and
# unsigned Windows installers show SmartScreen's "Windows protected your PC".
appId: dev.switchyard.desktop
productName: Switchyard
directories:
  buildResources: build
  output: release

files:
  - dist/**
  - package.json

# No native modules — skip the rebuild step entirely.
npmRebuild: false

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  # True one-click: double-click the installer and the app launches. Per-user
  # install (no UAC prompt for the app itself; only Docker's installer elevates).
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  artifactName: Switchyard-Setup-${version}.${ext}

mac:
  # zip is what electron-updater consumes; dmg is what humans download.
  target:
    - dmg
    - zip
  icon: build/icon.png
  category: public.app-category.developer-tools
  # Signing: electron-builder picks up the Developer ID cert from
  # CSC_LINK/CSC_KEY_PASSWORD; when they're absent it skips signing (and the
  # settings below are inert). Notarization needs signing plus
  # APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID — `notarize: true`
  # degrades to a logged skip when those env vars are missing.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

publish:
  provider: github
  owner: sbdeals
  # The repo's CANONICAL name (renamed again from the long
  # "Switchyard-The-Open-Source-Railway-Alternative" slug; GitHub redirects old
  # names, but the update feed baked into shipped apps shouldn't rely on that).
  repo: Switchyard
  # CI pre-creates the tag's release as a DRAFT and its `publish` job flips it
  # live after verifying the assets (.github/workflows/release.yml). draft here
  # means the legs only ever upload into that existing draft — with `release`,
  # electron-builder would publish a half-populated release the moment the
  # first leg finishes (and, when no release exists yet, each leg creates its
  # own — the v0.1.1/v0.1.2 duplicate-release race).
  releaseType: draft
