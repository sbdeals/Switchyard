# Packaging for the Switchyard desktop app. Windows is unsigned for now (shows
# SmartScreen on first run). macOS is signed + notarized in CI when the
# Developer ID secrets are present (see .github/workflows/release.yml and
# desktop/README.md); without them electron-builder logs a warning and falls
# back to an unsigned build, so forks and local `npm run dist` still work —
# but macOS auto-update only functions on the signed builds.
appId: dev.switchyard.desktop
productName: Switchyard
directories:
  buildResources: build
  output: release

files:
  - dist/**
  - package.json

# No native modules — skip the rebuild step entirely.
npmRebuild: false

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  # True one-click: double-click the installer and the app launches. Per-user
  # install (no UAC prompt for the app itself; only Docker's installer elevates).
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  artifactName: Switchyard-Setup-${version}.${ext}

mac:
  # zip is what electron-updater consumes; dmg is what humans download.
  target:
    - dmg
    - zip
  icon: build/icon.png
  category: public.app-category.developer-tools
  # Signing: electron-builder picks up the Developer ID cert from
  # CSC_LINK/CSC_KEY_PASSWORD; when they're absent it skips signing (and the
  # settings below are inert). Notarization needs signing plus
  # APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID — `notarize: true`
  # degrades to a logged skip when those env vars are missing.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

publish:
  provider: github
  owner: sbdeals
  # The repo's CANONICAL name (it was renamed from plain "switchyard"; GitHub
  # redirects old names, but the update feed shouldn't rely on that).
  repo: Switchyard-The-Open-Source-Railway-Alternative
  # Publish straight to the tag's release (not a draft) so latest.yml is
  # immediately visible to electron-updater.
  releaseType: release
