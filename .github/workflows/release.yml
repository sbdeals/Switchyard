# Tag-driven release: `git tag v0.1.0 && git push --tags` publishes
#   1. ghcr.io/<owner>/switchyard:<version> + :latest   (dashboard image)
#   2. switchyard-cli@<version> to npm                  (needs NPM_TOKEN secret)
#   3. desktop installers (NSIS + DMG/zip) + latest.yml onto the GitHub
#      release — electron-updater's auto-update feed
#   4. beginner-facing polish on that release: stable-named installer aliases
#      (the README's evergreen download buttons) and a "which file do I
#      download" intro prepended to the generated notes
# The image job runs first so the CLI's default tag (its own version) always
# has a matching image by the time the package is installable.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # npm --provenance

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match cli/package.json and desktop/package.json versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          for pkg in cli desktop; do
            ver=$(node -p "require('./$pkg/package.json').version")
            if [ "$tag" != "$ver" ]; then
              echo "::error::tag v$tag does not match $pkg/package.json version $ver"
              exit 1
            fi
          done

  # Create the tag's release up front so both desktop legs attach assets to
  # the SAME release object. When none exists, electron-builder's publisher
  # creates one per leg — a race that split the v0.1.1/v0.1.2 assets across
  # duplicate releases for the same tag (GitHub happily hosts several).
  #
  # Created as a DRAFT so `releases/latest` (the README download link and the
  # electron-updater feed) never points at a release that has no installers
  # yet; the `publish` job at the end verifies the assets and flips it live.
  # The existence check replaces a blanket `|| true`, which would also have
  # swallowed real failures and quietly resurrected the duplicate race.
  release:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release for the tag (skip if one already exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq --arg t "$GITHUB_REF_NAME" '[.[] | select(.tag_name == $t)] | length')
          if [ "$existing" -gt 0 ]; then
            echo "release for $GITHUB_REF_NAME already exists — reusing it"
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --draft --title "${GITHUB_REF_NAME#v}" --generate-notes
          fi

  image:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/switchyard
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: dashboard
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SWITCHYARD_VERSION=${{ steps.meta.outputs.version }}

  npm:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
        working-directory: cli
      - run: npm publish --provenance --access public
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Desktop installers. Runs after `image` so the app's first converge can pull
  # a published dashboard image tagged with this same version. electron-builder
  # uploads the installers AND latest.yml/latest-mac.yml (the auto-update feed)
  # to the tag's GitHub release.
  #
  # macOS signing/notarization: the gating step below exports the signing env
  # only when the cert secret is actually set (see desktop/README.md for the
  # one-time Apple Developer setup); with the vars truly unset, electron-builder
  # skips signing/notarization with a warning and the build succeeds unsigned
  # (macOS auto-update won't work on it; plain download/install does).
  desktop:
    needs: [image, release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: desktop
      - run: npm run build
        working-directory: desktop
      # Export macOS signing env only when the cert secret exists. An
      # empty-but-defined CSC_LINK is NOT ignored by electron-builder: it tries
      # to read '' as a certificate file and the build dies with "not a file"
      # (exactly how the v0.1.1 macOS leg failed). Gated to the macOS leg:
      # CSC_LINK is cross-platform in electron-builder, and the Developer ID
      # cert must not leak into the Windows signing path.
      - name: Enable macOS signing when certs are configured
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          S_CSC_LINK: ${{ secrets.CSC_LINK }}
          S_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          S_APPLE_ID: ${{ secrets.APPLE_ID }}
          S_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          S_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$S_CSC_LINK" ]; then
            {
              echo "CSC_LINK=$S_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$S_CSC_KEY_PASSWORD"
              echo "APPLE_ID=$S_APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$S_APPLE_APP_SPECIFIC_PASSWORD"
              echo "APPLE_TEAM_ID=$S_APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "Signing secrets present — signed + notarized build."
          else
            # Also stop electron-builder from probing the runner keychain.
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "No signing secrets — building unsigned."
          fi
      # Windows code signing — the SmartScreen "Windows protected your PC"
      # interstitial exists because the installer is unsigned. Three identities
      # are supported, activated purely by secrets and checked in this order
      # (absent secrets = unsigned build, exactly as before — forks and
      # cert-less runs stay green). See desktop/README.md for setup:
      #   A. SignPath Foundation — FREE for open source. The exe is built
      #      unpublished, signed on SignPath's HSM by the post-build steps
      #      below, its updater metadata rebuilt, then uploaded. Secrets:
      #      SIGNPATH_API_TOKEN + SIGNPATH_ORG_ID (+ project/policy slugs
      #      consumed by the signing step).
      #   B. Azure Trusted Signing (~$10/month, immediate SmartScreen trust):
      #      AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET +
      #      AZURE_SIGNING_ENDPOINT / AZURE_SIGNING_ACCOUNT /
      #      AZURE_CERT_PROFILE. electron-builder's win.azureSignOptions path
      #      drives the Invoke-TrustedSigning module, installed on demand
      #      (values must not contain spaces — they're passed as -c flags).
      #   C. Classic PFX (OV certificate): WIN_CSC_LINK (base64 .pfx) +
      #      WIN_CSC_KEY_PASSWORD, picked up natively by electron-builder.
      #      SmartScreen reputation then builds over time per certificate.
      - name: Enable Windows signing when certs are configured
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          S_SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          S_SIGNPATH_ORG_ID: ${{ secrets.SIGNPATH_ORG_ID }}
          S_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          S_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          S_AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          S_AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          S_AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          S_AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
          S_WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          S_WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ($env:S_SIGNPATH_API_TOKEN -and $env:S_SIGNPATH_ORG_ID) {
            @(
              "SIGNPATH_ACTIVE=true"
              "EB_PUBLISH=never"
            ) | Add-Content $env:GITHUB_ENV
            Write-Host "SignPath secrets present - signing post-build via SignPath (free OSS signing)."
          } elseif ($env:S_AZURE_TENANT_ID -and $env:S_AZURE_SIGNING_ENDPOINT -and $env:S_AZURE_SIGNING_ACCOUNT -and $env:S_AZURE_CERT_PROFILE) {
            # The TrustedSigning module is what electron-builder invokes; the
            # NuGet provider install first avoids the runner's interactive
            # prompt (electron-builder#8828).
            Install-PackageProvider -Name NuGet -Force -Scope CurrentUser | Out-Null
            Install-Module -Name TrustedSigning -Force -Scope CurrentUser -Repository PSGallery
            @(
              "AZURE_TENANT_ID=$env:S_AZURE_TENANT_ID"
              "AZURE_CLIENT_ID=$env:S_AZURE_CLIENT_ID"
              "AZURE_CLIENT_SECRET=$env:S_AZURE_CLIENT_SECRET"
              "EB_WIN_SIGN_ARGS=-c.win.azureSignOptions.endpoint=$env:S_AZURE_SIGNING_ENDPOINT -c.win.azureSignOptions.codeSigningAccountName=$env:S_AZURE_SIGNING_ACCOUNT -c.win.azureSignOptions.certificateProfileName=$env:S_AZURE_CERT_PROFILE"
            ) | Add-Content $env:GITHUB_ENV
            Write-Host "Azure Trusted Signing secrets present - signed Windows build."
          } elseif ($env:S_WIN_CSC_LINK) {
            @(
              "WIN_CSC_LINK=$env:S_WIN_CSC_LINK"
              "WIN_CSC_KEY_PASSWORD=$env:S_WIN_CSC_KEY_PASSWORD"
            ) | Add-Content $env:GITHUB_ENV
            Write-Host "PFX signing secrets present - signed Windows build."
          } else {
            Write-Host "No Windows signing secrets - building unsigned (SmartScreen warning stays)."
          }
      # bash on both legs so the optional $EB_WIN_SIGN_ARGS / $EB_PUBLISH
      # expansions are uniform (absent and harmless on macOS / unsigned runs).
      # SignPath runs set EB_PUBLISH=never: the exe must be signed BEFORE it
      # (and its updater metadata) reach the release.
      - run: npx electron-builder --publish "${EB_PUBLISH:-always}" $EB_WIN_SIGN_ARGS
        shell: bash
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- SignPath Foundation free OSS signing (active only with secrets) ---
      # Ship the unpublished exe to SignPath's HSM, then rebuild what signing
      # invalidated — the differential-update blockmap and latest.yml's
      # sha512/size — and upload all three to the tag's draft release (created
      # by the `release` job, published by `publish` after verification).
      - name: Upload unsigned installer for SignPath
        if: matrix.os == 'windows-latest' && env.SIGNPATH_ACTIVE == 'true'
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: win-unsigned-installer
          path: desktop/release/Switchyard-Setup-*.exe
          if-no-files-found: error
      - name: Sign the installer via SignPath
        if: matrix.os == 'windows-latest' && env.SIGNPATH_ACTIVE == 'true'
        uses: signpath/github-action-submit-signing-request@v1.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: desktop/release-signed
      - name: Publish signed installer + rebuilt update metadata
        if: matrix.os == 'windows-latest' && env.SIGNPATH_ACTIVE == 'true'
        shell: bash
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          exe="Switchyard-Setup-$version.exe"
          mv -f "release-signed/$exe" "release/$exe"
          ./node_modules/.bin/app-builder blockmap --input "release/$exe" --output "release/$exe.blockmap"
          sha=$(node -e "const c=require('crypto'),f=require('fs');console.log(c.createHash('sha512').update(f.readFileSync('release/$exe')).digest('base64'))")
          size=$(node -e "console.log(require('fs').statSync('release/$exe').size)")
          # latest.yml references only this one file, so global replaces are exact.
          node -e "
            const fs = require('fs');
            const file = 'release/latest.yml';
            let y = fs.readFileSync(file, 'utf8');
            y = y.replace(/sha512: .*/g, 'sha512: ' + process.argv[1]);
            y = y.replace(/size: .*/g, 'size: ' + process.argv[2]);
            fs.writeFileSync(file, y);
          " "$sha" "$size"
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber \
            "release/$exe" "release/$exe.blockmap" "release/latest.yml"
          echo "signed installer + rebuilt updater feed uploaded"

  # Flip the draft live once the assets a Windows user needs are actually on
  # it, and mark it the repo's Latest release (so /releases/latest — the README
  # download link and electron-updater's feed — resolves to it). Runs even if
  # a desktop leg failed: a broken macOS build must not strand the release as
  # an invisible draft, but a missing Windows installer fails loudly here and
  # leaves the draft for inspection.
  #
  # Before flipping it live, make the release page beginner-readable — the raw
  # Assets list (blockmaps, yml feeds, mac zip) is electron-updater plumbing
  # GitHub won't let us hide, so:
  #   - re-upload the installers under stable names: /releases/latest/download/
  #     of a stable name is what the README's download buttons point at, and
  #     it keeps working from version to version
  #   - prepend a "which file do I download" table to the generated notes so
  #     the first thing a visitor sees answers exactly that
  publish:
    needs: [release, desktop]
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Locate the tag's release and verify required assets
        id: locate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          matches=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq --arg t "$GITHUB_REF_NAME" '[.[] | select(.tag_name == $t)] | map(.id)')
          count=$(jq 'length' <<<"$matches")
          if [ "$count" -ne 1 ]; then
            echo "::error::expected exactly 1 release for $GITHUB_REF_NAME, found $count — refusing to publish"
            exit 1
          fi
          release_id=$(jq -r '.[0]' <<<"$matches")
          assets=$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id" --jq '.assets[].name')
          printf 'assets on release %s:\n%s\n' "$release_id" "$assets"
          version="${GITHUB_REF_NAME#v}"
          for required in "Switchyard-Setup-$version.exe" "latest.yml"; do
            if ! grep -qxF "$required" <<<"$assets"; then
              echo "::error::required asset $required is missing — leaving the release as a draft"
              exit 1
            fi
          done
          {
            echo "release_id=$release_id"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      # The Windows source asset is guaranteed by the check above; the mac
      # alias is skipped when that leg didn't build (its notes row then points
      # at the CLI instead). Deleting a stale alias first keeps re-runs clean.
      # curl doesn't forward the Authorization header across the redirect to
      # the asset CDN, which is exactly what that host requires.
      - name: Re-upload installers under stable names for the README buttons
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.locate.outputs.release_id }}
          VERSION: ${{ steps.locate.outputs.version }}
        run: |
          assets_json=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            --jq '[.assets[] | {id, name}]')
          for pair in \
            "Switchyard-Setup-$VERSION.exe=Switchyard-Setup-Windows.exe" \
            "Switchyard-$VERSION-arm64.dmg=Switchyard-Mac-AppleSilicon.dmg"; do
            src="${pair%%=*}" dest="${pair#*=}"
            src_id=$(jq -r --arg n "$src" '.[] | select(.name == $n).id' <<<"$assets_json")
            if [ -z "$src_id" ]; then
              echo "$src not on the release (leg skipped or failed) — no $dest alias"
              continue
            fi
            old_id=$(jq -r --arg n "$dest" '.[] | select(.name == $n).id' <<<"$assets_json")
            if [ -n "$old_id" ]; then
              gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$old_id"
            fi
            curl -fsSL --retry 3 -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/assets/$src_id" \
              -o /tmp/alias-src
            curl -fsS --retry 3 -X POST -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @/tmp/alias-src \
              "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=$dest" \
              >/dev/null
            echo "aliased $src -> $dest"
          done

      - name: Prepend a "which file do I download" intro to the notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.locate.outputs.release_id }}
        run: |
          release_json=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID")
          body=$(jq -r '.body // ""' <<<"$release_json")
          if grep -qF 'Which file do I download?' <<<"$body"; then
            echo "notes already carry the intro — leaving them alone"
            exit 0
          fi
          base="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME"
          if jq -e '.assets[] | select(.name == "Switchyard-Mac-AppleSilicon.dmg")' \
            <<<"$release_json" >/dev/null; then
            mac_row="| 🍎 **Mac** with Apple Silicon (M1–M4) | **[Switchyard-Mac-AppleSilicon.dmg]($base/Switchyard-Mac-AppleSilicon.dmg)** |"
          else
            mac_row="| 🍎 **Mac** | no build this release — run \`npx switchyard-cli up\` |"
          fi
          {
            cat <<INTRO
          ## ⬇️ Which file do I download?

          | Your computer | Download this one |
          | --- | --- |
          | 🪟 **Windows** 10 / 11 | **[Switchyard-Setup-Windows.exe]($base/Switchyard-Setup-Windows.exe)** |
          $mac_row
          | 🐧 **Linux** / a server | no download — run \`npx switchyard-cli up\` |

          One download, one double-click. The setup wizard installs everything it needs (including Docker), and when it finishes the window **is** your dashboard, already signed in.

          <details>
          <summary>⚠️ <b>First launch shows a security warning</b> — the 10-second fix</summary>

          The builds aren't code-signed yet (signing is planned):

          - **Windows:** SmartScreen may warn → **More info** → **Run anyway**.
          - **macOS 15 and later:** open the app once (it gets blocked), then **System Settings → Privacy & Security** → scroll down → **Open Anyway**.
          - **macOS 14 and earlier:** right-click the app → **Open** → **Open**.
          - **Intel Macs:** no installer yet — use \`npx switchyard-cli up\` in Terminal.
          </details>

          <details>
          <summary>🤔 <b>What are all the other files under Assets?</b></summary>

          Plumbing for the app's built-in auto-updater — \`latest.yml\` / \`latest-mac.yml\` (update feeds), \`*.blockmap\` (delta-download indexes), the mac \`.zip\` (what the updater actually installs), and the version-numbered originals of the installers above. You never need to download any of them yourself.
          </details>

          ---

          INTRO
            printf '%s\n' "$body"
          } > /tmp/notes.md
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F "body=@/tmp/notes.md" >/dev/null
          echo "prepended download intro to the release notes"

      - name: Publish the release and mark it Latest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.locate.outputs.release_id }}
        run: |
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false -f make_latest=true >/dev/null
          echo "published release $GITHUB_REF_NAME (id $RELEASE_ID) as Latest"
