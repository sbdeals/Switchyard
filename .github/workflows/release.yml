# Tag-driven release: `git tag v0.1.0 && git push --tags` publishes
#   1. ghcr.io/<owner>/switchyard:<version> + :latest   (dashboard image)
#   2. switchyard-cli@<version> to npm                  (needs NPM_TOKEN secret)
# The image job runs first so the CLI's default tag (its own version) always
# has a matching image by the time the package is installable.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # npm --provenance

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match cli/package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(node -p "require('./cli/package.json').version")
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match cli/package.json version $ver"
            exit 1
          fi

  image:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/switchyard
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: dashboard
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SWITCHYARD_VERSION=${{ steps.meta.outputs.version }}

  npm:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
        working-directory: cli
      - run: npm publish --provenance --access public
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
