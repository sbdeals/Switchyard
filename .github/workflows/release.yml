# Tag-driven release: `git tag v0.1.0 && git push --tags` publishes
#   1. ghcr.io/<owner>/switchyard:<version> + :latest   (dashboard image)
#   2. switchyard-cli@<version> to npm                  (needs NPM_TOKEN secret)
#   3. desktop installers (NSIS + DMG/zip) + latest.yml onto the GitHub
#      release — electron-updater's auto-update feed
# The image job runs first so the CLI's default tag (its own version) always
# has a matching image by the time the package is installable.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # npm --provenance

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match cli/package.json and desktop/package.json versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          for pkg in cli desktop; do
            ver=$(node -p "require('./$pkg/package.json').version")
            if [ "$tag" != "$ver" ]; then
              echo "::error::tag v$tag does not match $pkg/package.json version $ver"
              exit 1
            fi
          done

  image:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/switchyard
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: dashboard
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SWITCHYARD_VERSION=${{ steps.meta.outputs.version }}

  npm:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
        working-directory: cli
      - run: npm publish --provenance --access public
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Desktop installers. Runs after `image` so the app's first converge can pull
  # a published dashboard image tagged with this same version. electron-builder
  # uploads the installers AND latest.yml/latest-mac.yml (the auto-update feed)
  # to the tag's GitHub release.
  #
  # macOS signing/notarization: driven entirely by the env vars below (see
  # desktop/README.md for the one-time Apple Developer setup). When the secrets
  # are absent — forks, or before certs exist — the vars resolve to empty
  # strings, electron-builder skips signing/notarization with a warning, and
  # the build still succeeds (unsigned; macOS auto-update won't work on it).
  desktop:
    needs: image
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: desktop
      - run: npm run build
        working-directory: desktop
      - run: npx electron-builder --publish always
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Gated to the macOS leg: CSC_LINK is cross-platform in
          # electron-builder, and the Developer ID cert must not leak into the
          # Windows signing path.
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
